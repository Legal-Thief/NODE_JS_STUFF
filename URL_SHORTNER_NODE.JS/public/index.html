<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>URL Shortener</h1>

    <form id="shorten-form">

        <div>
            <label>URL</label>
            <input
                type="url"
                id="url"
                name="url"
                placeholder="https://example.com"
                required
            >
        </div>

        <div>
            <label>Short Code</label>
            <input
                type="text"
                id="shortCode"
                name="shortCode"
                placeholder="google"
                required
            >
        </div>

        <button type="submit">
            Shorten
        </button>

    </form>

    <h2>Shortened URLs</h2>

    <ul id="shortened-urls"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
